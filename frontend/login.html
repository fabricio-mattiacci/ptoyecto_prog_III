<!--
  login.html — INICIO DE SESIÓN
  ─────────────────────────────
  Qué hace:
  - Formulario email + contraseña → POST /api/usuarios/login.
  - Botones de ACCESO RÁPIDO (admin, Tomás, Fabricio) cargan email/clave de prueba.
  - Si el login es correcto, guarda el usuario en localStorage y redirige:
      admin → admin.html | usuario → index.html
  - Si ya estás logueado y entrás acá, te manda al home o al admin.

  No hay registro: los usuarios se cargan en la base (seed).
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ApostApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="body-auth">

    <!-- HEADER -->
    <header class="header">
        <div class="header-logo">
            <h1 class="js-link-home" style="cursor:pointer">🎯 ApostApp</h1>
        </div>
    </header>

    <!-- LOGIN -->
    <main class="auth-container">
        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <p class="auth-subtitulo">Ingresá tus datos para acceder</p>

            <div class="perfiles-rapidos">
                <p class="perfiles-titulo">Acceso rápido</p>
                <div class="perfiles-botones" id="perfilesBotones"></div>
            </div>

            <div class="auth-form">
                <div class="form-grupo">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="tu@email.com">
                </div>

                <div class="form-grupo">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña">
                </div>

                <div id="errorLogin" class="error-mensaje" style="display:none">
                    Email o contraseña incorrectos
                </div>

                <button class="btn btn-primary btn-full" id="btnLogin">
                    Iniciar Sesión
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 ApostApp — UTN FRSN — Programación III</p>
    </footer>

    <script src="js/datos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
