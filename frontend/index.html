<!--
  index.html — PÁGINA PRINCIPAL (home)
  ───────────────────────────────────
  Qué hace:
  - Muestra la apuesta DESTACADA arriba (la que el admin marcó con prioridad).
  - Lista APUESTAS VIGENTES (aún se puede apostar).
  - Lista APUESTAS CERRADAS (ya vencieron o el admin las cerró).
  - El contenido real lo arma main.js leyendo datos.json (no está fijo en el HTML).
  - Cada 3 segundos revisa si cambió el JSON y actualiza la pantalla.

  Scripts: datos.js (lee JSON) → main.js (pinta cards y eventos).
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Apuestas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-logo">
            <h1 class="js-link-home" style="cursor:pointer">🎯 ApostApp</h1>
        </div>
        <nav class="header-nav"></nav>
    </header>

    <!-- APUESTA DESTACADA -->
    <section class="destacada">
        <div class="destacada-badge">⭐ DESTACADA</div>
        <h2 class="destacada-titulo">Final ATP Madrid</h2>
        <div class="destacada-info">
            <span>📅 Fecha evento: 01/05/2026</span>
            <span>⏰ Cierra: 30/04/2026</span>
            <span>💰 Pozo: $90.000</span>
        </div>
        <div class="destacada-pronosticos">
            <div class="pronostico-card">
                <p>Gana Jannik Sinner</p>
                <span class="dividendo">1.63x</span>
            </div>
            <div class="pronostico-card">
                <p>Gana Carlos Alcaraz</p>
                <span class="dividendo">2.00x</span>
            </div>
        </div>
        <button type="button" class="btn btn-primary" id="btnApostarDestacada">Apostar ahora</button>
    </section>

    <!-- APUESTAS VIGENTES -->
    <main class="contenido">
        <h2 class="seccion-titulo">Apuestas Vigentes</h2>
        <div class="apuestas-grid" id="apuestasVigentes"></div>

        <!-- APUESTAS CERRADAS -->
        <h2 class="seccion-titulo">Apuestas Cerradas</h2>
        <div class="apuestas-grid" id="apuestasCerradas"></div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 ApostApp — UTN FRSN — Programación III</p>
    </footer>

    <script src="js/datos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
