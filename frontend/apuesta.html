<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuesta - ApostApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-logo">
            <h1 class="js-link-home" style="cursor:pointer">🎯 ApostApp</h1>
        </div>
        <nav class="header-nav"></nav>
    </header>

    <!-- DETALLE APUESTA -->
    <main class="contenido">

        <!-- INFO PRINCIPAL -->
        <div class="apuesta-detalle-header">
            <button type="button" class="btn btn-outline btn-small" id="btnVolver">
                ← Volver
            </button>
            <div class="apuesta-detalle-info">
                <h2 id="apuestaTitulo">Final ATP Madrid</h2>
                <div class="apuesta-datos">
                    <span>📅 Fecha evento: <strong>01/05/2026</strong></span>
                    <span>⏰ Cierra: <strong>30/04/2026</strong></span>
                    <span>💰 Pozo actual: <strong>$90.000</strong></span>
                </div>
            </div>
        </div>

        <div class="apuesta-detalle-contenido">

            <!-- PRONÓSTICOS -->
            <div class="pronosticos-seccion">
                <h3>Seleccioná tu pronóstico</h3>
                <div class="pronosticos-lista" id="pronosticosList"></div>
                <div id="resultadoPersonas"></div>
            </div>

            <!-- FORMULARIO DE APUESTA -->
            <div class="apuesta-form-seccion">
                <h3>Realizá tu apuesta</h3>
                <div class="apuesta-form">

                    <div class="form-grupo">
                        <label>Pronóstico seleccionado</label>
                        <input type="text" id="pronosticoSeleccionado" 
                               placeholder="Seleccioná un pronóstico" readonly>
                    </div>

                    <div class="form-grupo">
                        <label>Monto a apostar ($)</label>
                        <input type="number" id="montoApuesta" 
                               placeholder="Máximo $100.000" min="1" max="100000">
                    </div>

                    <div class="apuesta-resumen" id="resumenApuesta" style="display:none">
                        <h4>Resumen</h4>
                        <div class="resumen-fila">
                            <span>Pronóstico:</span>
                            <span id="resumenPronostico">-</span>
                        </div>
                        <div class="resumen-fila">
                            <span>Monto:</span>
                            <span id="resumenMonto">-</span>
                        </div>
                        <div class="resumen-fila">
                            <span>Dividendo actual:</span>
                            <span id="resumenDividendo">-</span>
                        </div>
                        <div class="resumen-fila ganancia">
                            <span>Ganancia estimada:</span>
                            <span id="resumenGanancia">-</span>
                        </div>
                    </div>

                    <div id="errorApuesta" class="error-mensaje" style="display:none">
                        Error al realizar la apuesta
                    </div>

                    <button type="button" class="btn btn-primary btn-full" id="btnApostar">
                        Confirmar Apuesta
                    </button>

                </div>
            </div>

        </div>
    </main>

    <footer class="footer">
        <p>© 2026 ApostApp — UTN FRSN — Programación III</p>
    </footer>

    <script src="js/datos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
